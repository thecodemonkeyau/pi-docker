version: '3.8'
services:
  mysql:
    image: mariadb:latest
    networks:
      - dbnetwork
    ports:
      - 3306:3306
    volumes:
      - /docker-data/mariadb/data:/var/lib/mysql
      
  phpmyadmin:
    image: phpmyadmin:latest
    depends_on:
      - mysql
    networks:
      - dbnetwork
    ports:
      - 3307:80
    environment:
      PMA_HOST: mysql

networks:
  dbnetwork:
    driver: overlay
    attachable: true
